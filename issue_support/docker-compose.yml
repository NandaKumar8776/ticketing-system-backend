services:
  # ── Application ──────────────────────────────
  app:
    build: .
    container_name: issue-support-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MILVUS_URI=http://milvus-standalone:19530
      - FILE_DIR=/app/data/PC_trouble-shooting.pdf
      - LLM_PROMPT_DIR=/app/prompts/llm_prompt.txt
      - RAG_PROMPT_DIR=/app/prompts/rag_prompt.txt
      - ROUTER_PROMPT_DIR=/app/prompts/router_prompt.txt
      - EVALUATOR_LLM_PROMPT_DIR=/app/prompts/evaluator_llm_prompt.txt
      - GUARDRAILS_PROMPT_DIR=/app/prompts/guardrails_llm_prompt.txt
    depends_on:
      milvus-standalone:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rag-network

  # ── Milvus Vector Database ──────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"    # MinIO console
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    image: milvusdb/milvus:v2.4.4
    container_name: milvus-standalone
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"  # gRPC
      - "9091:9091"    # metrics
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  etcd_data:
  minio_data:
  milvus_data:

networks:
  rag-network:
    driver: bridge
